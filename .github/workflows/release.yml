name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: lolcat-linux-amd64
            install: sudo apt-get update; sudo apt-get install -y libboost-program-options-dev

          - os: macos-latest
            asset_name: lolcat-macos-arm64
            install: brew install boost
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          - os: windows-latest
            asset_name: lolcat-windows-amd64.exe
            install: vcpkg install boost-program-options:x64-windows-static
            cmake_args: "-DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ runner.os }}-boost-static

      - name: Install Dependencies
        run: ${{ matrix.install }}

      - name: Configure & Build
        run: |
          if ($IsMacOS) {
            $zstd = (brew --prefix zstd).Trim()
            $icu = (brew --prefix icu4c).Trim()
            $env:CMAKE_PREFIX_PATH = $zstd + ":" + $icu + ":" + $env:CMAKE_PREFIX_PATH
            $env:LIBRARY_PATH = $zstd + "/lib:" + $icu + "/lib:" + $env:LIBRARY_PATH
          }
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC=ON ${{ matrix.cmake_args }}
          cmake --build build --config Release --parallel

      - name: Install to Dist
        run: cmake --install build --config Release --prefix dist

      - name: Rename Artifact
        run: mv dist/bin/* ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Get Release Info
        id: info
        run: |
          # Strip the 'v' prefix
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          echo "SOURCE_URL=https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz" >> $GITHUB_OUTPUT
          echo "BINARY_URL=https://github.com/${{ github.repository }}/releases/download/v${VERSION}/lolcat-macos-arm64" >> $GITHUB_OUTPUT

      - name: Calculate Hashes
        id: shas
        run: |
          SOURCE_SHA=$(curl -sL ${{ steps.info.outputs.SOURCE_URL }} | shasum -a 256 | cut -d ' ' -f 1)
          BINARY_SHA=$(curl -sL ${{ steps.info.outputs.BINARY_URL }} | shasum -a 256 | cut -d ' ' -f 1)
          echo "SOURCE_SHA=$SOURCE_SHA" >> $GITHUB_OUTPUT
          echo "BINARY_SHA=$BINARY_SHA" >> $GITHUB_OUTPUT

      - name: Checkout Tap Repo
        uses: actions/checkout@v4
        with:
          repository: lolcatpp/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update Formula
        run: |
          cd tap/Formula
          FORMULA_FILE="lolcatpp.rb"

          # Update source resources
          sed -i "s|url \".*\" # source_url_marker|url \"${{ steps.info.outputs.SOURCE_URL }}\" # source_url_marker|" $FORMULA_FILE
          sed -i "s/sha256 \".*\" # source_sha_marker/sha256 \"${{ steps.shas.outputs.SOURCE_SHA }}\" # source_sha_marker/" $FORMULA_FILE

          # Update binary resources
          sed -i "s|url \".*\" # binary_url_marker|url \"${{ steps.info.outputs.BINARY_URL }}\" # binary_url_marker|" $FORMULA_FILE
          sed -i "s/sha256 \".*\" # binary_sha_marker/sha256 \"${{ steps.shas.outputs.BINARY_SHA }}\" # binary_sha_marker/" $FORMULA_FILE

          # Debug
          cat $FORMULA_FILE

      - name: Commit and Push
        run: |
          cd tap
          git config user.name "Love Billenius"
          git config user.email "lovebillenius@disroot.org"
          git add .
          git commit -m "Update formula to v${{ steps.info.outputs.VERSION }}"
          git push

  build-deb:
    name: Build .deb (${{ matrix.suite }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        suite:
          - trixie
          - noble
          - plucky
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - suite: trixie
            container: debian:13
          - suite: noble
            container: ubuntu:24.04
          - suite: plucky
            container: ubuntu:25.04

    steps:
      - name: Install Build Dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates file \
            libboost-program-options-dev

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure & Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEB_VERSION_SUFFIX="~${{ matrix.suite }}"
          cmake --build build --config Release --parallel

      - name: Package with CPack
        working-directory: build
        run: cpack -G DEB

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.suite }}-${{ matrix.arch }}
          path: build/*.deb

  update-apt-repo:
    name: Update APT Repo
    needs: build-deb
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends reprepro gnupg

      - name: Download .debs
        uses: actions/download-artifact@v4
        with:
          path: debs
          pattern: deb-*

      - name: Import GPG Key
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Checkout APT Repo
        uses: actions/checkout@v4
        with:
          repository: lolcatpp/apt
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Refresh Repo Metadata
        run: |
          # Re-export so any conf/distributions changes (e.g. new architectures)
          # are applied to the dists/ indexes before we add the new packages.
          reprepro -b apt-repo export

      - name: Add .debs to Repo
        run: |
          for suite in trixie noble plucky; do
            for deb in debs/deb-${suite}-*/*.deb; do
              echo ">> Adding $deb to suite $suite"
              reprepro -b apt-repo includedeb "$suite" "$deb"
            done
          done

      - name: Commit and Push
        working-directory: apt-repo
        run: |
          git config user.name "Love Billenius"
          git config user.email "lovebillenius@disroot.org"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Update packages to ${GITHUB_REF#refs/tags/v}"
            git push
          else
            echo "No changes detected."
          fi

  build-rpm:
    name: Build .rpm (${{ matrix.suite }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        suite:
          - fedora-43
          - fedora-44
          - rhel-9
          - rhel-10
          - opensuse-leap-16.0
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - suite: fedora-43
            container: fedora:43
            installer: dnf
            cxx_pkg: gcc-c++
            boost_pkg: boost-devel
          - suite: fedora-44
            container: fedora:44
            installer: dnf
            cxx_pkg: gcc-c++
            boost_pkg: boost-devel
            # Stock F44 ships libstdc++-16.0.1 which lacks the strong
            # __do_vformat_to symbol that GCC 16.1.1's <format> headers
            # generate. Use libfmt instead until upstream catches up.
            extra_pkgs: fmt-devel
            force_libfmt: "ON"
          - suite: rhel-9
            container: rockylinux/rockylinux:9
            installer: dnf
            # Rocky 9 ships GCC 11 (no <format>); use Red Hat's gcc-toolset-15
            cxx_pkg: gcc-toolset-15-gcc-c++
            enable_script: /opt/rh/gcc-toolset-15/enable
            boost_pkg: boost-devel
          - suite: rhel-10
            container: rockylinux/rockylinux:10
            installer: dnf
            cxx_pkg: gcc-c++
            boost_pkg: boost-devel
          - suite: opensuse-leap-16.0
            container: opensuse/leap:16.0
            installer: zypper
            cxx_pkg: gcc-c++
            boost_pkg: libboost_program_options1_86_0-devel

    steps:
      - name: Install Build Dependencies (dnf)
        if: matrix.installer == 'dnf'
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            ${{ matrix.cxx_pkg }} cmake git rpm-build ${{ matrix.boost_pkg }} ${{ matrix.extra_pkgs }}

      - name: Install Build Dependencies (zypper)
        if: matrix.installer == 'zypper'
        run: |
          zypper --non-interactive install --no-recommends \
            ${{ matrix.cxx_pkg }} cmake git rpm-build ${{ matrix.boost_pkg }} ${{ matrix.extra_pkgs }}

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure & Build
        run: |
          if [ -n "${{ matrix.enable_script }}" ]; then
            source "${{ matrix.enable_script }}"
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DFORCE_LIBFMT=${{ matrix.force_libfmt || 'OFF' }}
          cmake --build build --config Release --parallel

      - name: Package with CPack
        working-directory: build
        run: cpack -G RPM

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.suite }}-${{ matrix.arch }}
          path: build/*.rpm

  update-rpm-repo:
    name: Update RPM Repo
    needs: build-rpm
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends createrepo-c gnupg

      - name: Download .rpms
        uses: actions/download-artifact@v4
        with:
          path: rpms
          pattern: rpm-*

      - name: Import GPG Key
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV

      - name: Checkout RPM Repo
        uses: actions/checkout@v4
        with:
          repository: lolcatpp/rpm
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: rpm-repo

      - name: Lay Out RPMs and Build Metadata
        run: |
          for suite in fedora-43 fedora-44 rhel-9 rhel-10 opensuse-leap-16.0; do
            mkdir -p "rpm-repo/${suite}"
            cp rpms/rpm-${suite}-*/*.rpm "rpm-repo/${suite}/"

            # Sign each RPM with the imported key (rpm --addsign uses the default key
            # via ~/.rpmmacros if set; pass via macros to avoid stateful config).
            for rpm in rpm-repo/${suite}/*.rpm; do
              rpm --define "_gpg_name ${GPG_KEY_ID}" --addsign "$rpm"
            done

            createrepo_c --update "rpm-repo/${suite}"

            # Sign repomd.xml so dnf/zypper can verify the metadata.
            gpg --batch --yes --detach-sign --armor \
              "rpm-repo/${suite}/repodata/repomd.xml"

            # Per-suite .repo file with $releasever so the same file follows
            # users across distro upgrades within a family (e.g. F43 → F44).
            case "$suite" in
              fedora-*)         baseurl_template='https://lolcatpp.github.io/rpm/fedora-$releasever' ;;
              rhel-*)           baseurl_template='https://lolcatpp.github.io/rpm/rhel-$releasever' ;;
              opensuse-leap-*)  baseurl_template='https://lolcatpp.github.io/rpm/opensuse-leap-$releasever' ;;
              *)                baseurl_template="https://lolcatpp.github.io/rpm/${suite}" ;;
            esac
            cat > "rpm-repo/${suite}/lolcatpp.repo" <<EOF
          [lolcatpp]
          name=lolcat++
          baseurl=${baseurl_template}
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://lolcatpp.github.io/rpm/pubkey.gpg
          EOF
          done

      - name: Commit and Push
        working-directory: rpm-repo
        run: |
          git config user.name "Love Billenius"
          git config user.email "lovebillenius@disroot.org"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Update packages to ${GITHUB_REF#refs/tags/v}"
            git push
          else
            echo "No changes detected."
          fi

  update-aur:
    name: Update AUR (${{ matrix.type }})
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: source
            pkgname: lolcat++
            script: deploy_aur_source.sh
          - type: binary
            pkgname: lolcat++-bin
            script: deploy_aur_binary.sh

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR Repo
        run: git clone ssh://aur@aur.archlinux.org/${{ matrix.pkgname }}.git aur-repo

      - name: Update Package
        working-directory: aur-repo
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash ../main-repo/scripts/${{ matrix.script }} "$VERSION"

      - name: Commit and Push
        working-directory: aur-repo
        run: |
          git config user.name "Love Billenius"
          git config user.email "lovebillenius@disroot.org"
          git add PKGBUILD .SRCINFO

          if ! git diff --cached --quiet; then
            git commit -m "Update to ${GITHUB_REF#refs/tags/v}"
            git push
          else
            echo "No changes detected."
          fi
